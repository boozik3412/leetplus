services:
  # PostgreSQL intentionally lives outside Docker:
  # WSL locally, native PostgreSQL or managed service on VDS.
  redis:
    image: redis:7
    container_name: leetplus_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: leetplus_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"