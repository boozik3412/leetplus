services:
  postgres:
    image: postgres:16
    container_name: leetplus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: leetplus
      POSTGRES_USER: leetplus
      POSTGRES_PASSWORD: leetplus_password
    ports:
      - "5432:5432"
    volumes:
      - leetplus_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: leetplus_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: leetplus_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  leetplus_postgres_data: